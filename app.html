<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Strem Tweaker V1.0</title>
  <style>
    :root{
      --bg1:#0b1126;--bg2:#16203c;--glass:rgba(22,30,58,.65);--line:rgba(255,255,255,.08);--text:#f5f8ff;--muted:#aab7d7;
      --blue:#7da8ff;--blue2:#4b7dff;--ok:#38d39f;--ko:#ff6d86;--wait:#ffb84d;--shadow:0 18px 42px rgba(0,0,0,.28);--radius:22px;
      --addon-h:56px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;height:100dvh;overflow:hidden;}
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 15% 0%, rgba(125,168,255,.12), transparent 28%),radial-gradient(circle at 100% 10%, rgba(56,211,159,.06), transparent 20%),linear-gradient(180deg,var(--bg1),var(--bg2));}
    body.dragging{overflow:hidden}

    /* Fixed wrap, only the list scrolls */
    .wrap{max-width:860px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;padding:14px 14px calc(14px + env(safe-area-inset-bottom));overflow:hidden;}

    .sticky{flex-shrink:0;padding-top:max(8px, env(safe-area-inset-top));margin:-14px -14px 12px;padding-left:14px;padding-right:14px}
    .sticky-inner{display:flex;justify-content:space-between;align-items:center;width:100%;gap:10px;}

    .glass{background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--radius)}
    .status{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:14px;background:rgba(15,20,38,.75);border:1px solid var(--line)}
    .dot{width:10px;height:10px;border-radius:999px;background:var(--wait);flex:0 0 auto;box-shadow:0 0 12px currentColor}.green{background:var(--ok);color:var(--ok)}.red{background:var(--ko);color:var(--ko)}.orange{background:var(--wait);color:var(--wait)}
    .status-text{font-size:12px;line-height:1.4}
    .hero,.panel{padding:16px;flex-shrink:0}.hero{margin-bottom:14px}
    h1,h2,p{margin:0}h1{font-size:24px;letter-spacing:-.02em}h2{font-size:17px}
    .version{color:#a7d5ff;font-size:12px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}.muted{color:var(--muted);font-size:13px;line-height:1.45;margin-top:6px}
    .login-head{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}.login-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

    /* Email on top right */
    .header-email{font-size:11px; color:#cce0ff; font-weight:600; background:rgba(125,168,255,0.12); padding:4px 8px; border-radius:10px; border:1px solid rgba(125,168,255,0.25); white-space:nowrap; max-width:140px; overflow:hidden; text-overflow:ellipsis;}

    .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);font-size:12px;font-weight:600}
    .pill.connected{background:rgba(56,211,159,.15);color:var(--ok);border-color:rgba(56,211,159,.3)}
    .pill.disconnected{background:rgba(255,109,134,.15);color:var(--ko);border-color:rgba(255,109,134,.3)}
    .chev{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;border:1px solid var(--line);background:rgba(17,23,42,.55);font-size:16px;transition:transform .2s ease}
    .panel.collapsed .chev{transform:rotate(-90deg)}.login-body{margin-top:14px}.panel.collapsed .login-body{display:none}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:grid;gap:6px;margin-top:12px}label{color:var(--muted);font-size:13px}
    input,textarea{width:100%;border:1px solid rgba(255,255,255,.08);background:rgba(8,12,24,.5);color:var(--text);outline:none;border-radius:16px;padding:14px 14px;font:inherit}textarea{min-height:80px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px}
    input:focus,textarea:focus{border-color:rgba(126,168,255,.8);box-shadow:0 0 0 3px rgba(126,168,255,.15)}
    .actions,.subactions{display:grid;gap:10px;margin-top:14px}.actions{grid-template-columns:1fr}.subactions{grid-template-columns:1fr 1fr}
    button{border:1px solid rgba(255,255,255,.08);background:rgba(17,24,46,.8);color:var(--text);font:inherit;cursor:pointer;border-radius:16px;padding:14px 14px;min-height:50px;transition:transform .15s ease,opacity .15s ease,box-shadow .15s ease,background .15s ease}button:hover{transform:translateY(-1px)}button:active{transform:scale(.98)}button:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .primary{background:linear-gradient(135deg, rgba(75,125,255,.95), rgba(126,168,255,.9));box-shadow:0 8px 20px rgba(75,125,255,.25);border:none} .ghost{background:rgba(17,24,46,.4)}
    .debug-toggle{margin-top:12px;color:#a7d5ff;background:none;border:0;padding:0;min-height:auto;text-align:left;font-size:13px}.hidden{display:none!important}

    .addons-panel{display:flex;flex-direction:column;flex:1;min-height:0;margin-bottom:0;}
    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;flex-shrink:0}
    .toolbar-actions {display:flex;align-items:center;gap:8px;}

    .pill-btn {width:32px;height:32px;border-radius:10px;display:grid;place-items:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--blue);cursor:pointer;transition:.2s;padding:0;min-height:0;}
    .pill-btn:hover {background:rgba(255,255,255,.1);}
    .pill-btn svg {width:16px;height:16px;}

    /* Scrollable list container */
    .addons-fit{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;position:relative;margin-top:12px;padding-right:4px;scroll-behavior:auto;}
    .addons-fit::-webkit-scrollbar { width: 6px; }
    .addons-fit::-webkit-scrollbar-track { background: transparent; }
    .addons-fit::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

    .list{display:grid;gap:8px;padding-bottom:12px;}

    /* ADDON CARD 2.0: Flex Column Expandable */
    .addon-card{
      display:flex; flex-direction:column; align-items:stretch; gap:0;
      height:auto; min-height:var(--addon-h); padding:0;
      border-radius:18px; border:1px solid rgba(255,255,255,.06);
      background:linear-gradient(180deg, rgba(28,38,68,.7), rgba(18,25,48,.6));
      box-shadow:0 4px 12px rgba(0,0,0,.15);
      transition:transform .15s ease, opacity .15s ease, filter .15s ease, background .2s ease;
      width:100%;
      overflow:hidden;
    }
    .addon-card.drag-source{opacity:0.3;filter:grayscale(0.5);transform:scale(0.98)}
    .addon-card.flash{animation:flash .3s ease}
    .addon-card.is-disabled{opacity:0.55;filter:grayscale(0.8);background:rgba(20,25,40,.5)}
    .addon-card.is-disabled .addon-title{text-decoration:line-through;color:var(--muted)}
    .addon-card.is-disabled .addon-icon{filter:grayscale(1) opacity(0.5);}

    .addon-card.expanded {
      background:linear-gradient(180deg, rgba(38,52,94,.9), rgba(24,34,64,.8));
      border-color: rgba(126,168,255,.2);
    }

    /* Row 1: Always visible */
    .addon-main{
      display:flex; align-items:center; gap:6px;
      height:var(--addon-h); width:100%; padding:6px 8px;
      cursor:pointer;
    }
    .addon-main:hover{background:rgba(255,255,255,.02);}

    .rank{flex:0 0 32px;width:32px;height:32px;border-radius:12px;display:grid;place-items:center;font-weight:700;font-size:12px;color:#cce0ff;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.05);transition:all .2s ease;}

    .addon-title-wrap{flex:1 1 0%;min-width:0;display:flex;align-items:center;gap:8px;}
    .addon-icon{flex:0 0 28px;width:28px;height:28px;border-radius:6px;object-fit:cover;background:rgba(255,255,255,.05);}
    .addon-title{flex:0 1 auto;font-weight:600;font-size:14px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
    .addon-version{flex:0 0 auto;font-size:11px;font-weight:500;color:var(--muted);background:rgba(255,255,255,.08);padding:2px 6px;border-radius:6px;}
    .addon-update-badge{flex:0 0 auto;font-size:10px;color:var(--wait);border:1px solid var(--wait);padding:2px 4px;border-radius:4px;white-space:nowrap;}

    /* Row 2: Expanded actions */
    .addon-actions{
      display:none; align-items:center; gap:8px;
      padding:2px 8px 12px 46px; /* align under title */
      flex-wrap:wrap; width:100%;
    }
    .addon-card.expanded .addon-actions { display:flex; }

    .action-btn{flex:0 0 36px;width:36px;height:36px;display:grid;place-items:center;color:var(--blue);cursor:pointer;border-radius:10px;transition:background .2s, color .2s}
    .action-btn:active{background:rgba(255,255,255,.1)}
    .action-btn svg{width:18px;height:18px}
    .action-btn:hover{background:rgba(255,255,255,.06)}

    .addon-actions .action-btn{ background:rgba(125,168,255,0.08); border:1px solid rgba(125,168,255,0.1); }
    .addon-actions .action-btn:hover{ background:rgba(125,168,255,0.15); }

    .is-disabled .action-btn.toggle-btn{color:var(--ko)}
    .hidden-btn{display:none!important;}

    .drag-handle{flex:0 0 40px;width:40px;height:40px;display:grid;place-items:center;color:rgba(255,255,255,.4);cursor:grab;touch-action:none;border-radius:10px;transition:color .2s, background .2s}
    .drag-handle:active{cursor:grabbing;color:rgba(255,255,255,.9);background:rgba(255,255,255,.08)}
    .drag-handle svg{width:20px;height:20px}

    /* Floating clone styling */
    .floating-card{position:fixed;z-index:998;box-shadow:0 30px 60px rgba(0,0,0,.4), 0 0 0 1px rgba(126,168,255,.3);pointer-events:none;transform-origin:top left;transition:none;width:100%;max-width:calc(860px - 28px);}
    .floating-card .drag-handle{color:rgba(255,255,255,.9)}
    .floating-card .rank{background:rgba(126,168,255,.15);border-color:rgba(126,168,255,.3);color:var(--blue);}

    .empty{color:var(--muted);margin-top:14px;padding:14px;border:1px dashed var(--line);border-radius:16px;background:rgba(13,19,36,.42)}

    /* Edit Modal */
    .modal-overlay {position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;padding:14px;}
    .modal-overlay.active {opacity:1;pointer-events:auto;}
    .modal-card {background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius);width:100%;max-width:400px;padding:20px;box-shadow:var(--shadow);transform:translateY(20px);transition:transform 0.2s;}
    .modal-overlay.active .modal-card {transform:translateY(0);}
    .modal-card h3 {margin:0 0 4px 0;font-size:18px;}
    .modal-card p {margin:0 0 12px 0;font-size:12px;color:var(--muted);word-break:break-all;}
    .modal-card textarea {width:100%;font-size:13px;line-height:1.4;}

    body.addons-mode .hero{display:none}
    body.addons-mode #loginPanel{padding:10px 14px}
    body.addons-mode #loginPanel .desc{display:none}

    @keyframes flash{0%{transform:scale(.98)}50%{transform:scale(1.02);background:rgba(126,168,255,.1)}100%{transform:scale(1)}}
    @media (max-width:640px){
      .wrap{padding:12px 12px calc(12px + env(safe-area-inset-bottom))}
      .sticky{margin:-12px -12px 8px;padding-left:12px;padding-right:12px}
      .panel{padding:12px}
      .addon-main{gap:4px;height:54px;padding:5px 6px}
      .rank{flex:0 0 24px;width:24px;height:24px;font-size:10px}
      .addon-title-wrap{gap:6px;}
      .addon-icon{flex:0 0 24px;width:24px;height:24px;border-radius:5px;}
      .addon-title{font-size:13px}
      .addon-version{font-size:10px;padding:1px 4px;}
      .action-btn{flex:0 0 32px;width:32px;height:32px}
      .action-btn svg{width:16px;height:16px}
      .drag-handle{flex:0 0 32px;width:32px;height:32px}
      .pill-btn{width:28px;height:28px;}
      .pill-btn svg{width:14px;height:14px;}
      .status-text{font-size:11px;}
      .header-email{font-size:10px; padding:3px 6px; max-width: 100px;}
      .addon-actions{padding:0 6px 10px 34px; gap:6px;}
    }
  </style>
</head>
<body>
  <div class="wrap" id="mainWrap">
    <div class="sticky">
      <div class="sticky-inner">
        <div class="status glass"><span id="statusDot" class="dot orange"></span><div id="statusText" class="status-text">En attente.</div></div>
        <span id="headerEmail" class="header-email hidden"></span>
      </div>
    </div>
    <section class="hero glass"><div class="version">V1.0</div><h1>Strem Tweaker</h1><p class="muted">Version finale : Interface compacte et autoscroll intelligent.</p></section>

    <section id="loginPanel" class="panel glass">
      <div id="loginHead" class="login-head">
        <div>
          <div style="display:flex; align-items:center;">
            <h2>Connexion</h2>
          </div>
          <p class="muted desc">Se replie et charge les addons automatiquement.</p>
        </div>
        <div class="login-meta"><div id="loginStatePill" class="pill disconnected">Non connecté</div><div class="chev">⌃</div></div>
      </div>
      <div class="login-body">

        <div class="row">
          <div class="field"><label for="email">Email</label><input id="email" type="email" placeholder="email@exemple.com" autocomplete="username"></div>
          <div class="field"><label for="password">Mot de passe</label><input id="password" type="password" placeholder="mot de passe" autocomplete="current-password"></div>
        </div>

        <div class="field" style="margin-top:12px;">
          <label for="authKey">AuthKey Stremio (Optionnel si tu mets l'email)</label>
          <div style="position:relative; display:flex; align-items:center;">
            <input id="authKey" type="password" placeholder="Clé récupérée automatiquement, ou à coller..." style="padding-right:44px;">
            <div id="toggleAuthKey" style="position:absolute; right:12px; display:flex; color:var(--muted); cursor:pointer; transition:color 0.2s;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="loginBtn" class="primary" type="button">Connexion & Charger</button>
        </div>

        <div class="subactions" style="margin-top:10px">
          <button id="clearBtn" class="ghost" type="button">Tout Effacer</button>
          <button id="copyBtn" class="ghost" type="button">Copier AuthKey</button>
        </div>

        <button id="debugToggle" class="debug-toggle" type="button">Afficher debug</button>
        <div id="debugWrap" class="field hidden"><textarea id="debugBox" readonly placeholder="Réponses API"></textarea></div>
      </div>
    </section>

    <section id="addonsCard" class="panel glass addons-panel hidden">
      <div class="toolbar">
        <h2>Mes addons</h2>
        <div class="toolbar-actions">
          <button id="btnCheckUpdates" class="pill-btn" title="Vérifier les mises à jour" style="color:var(--wait); border-color:rgba(255,184,77,.3);">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.53-12.28l5.67-5.67"/></svg>
          </button>
          <div style="width:1px; height:20px; background:var(--line); margin:0 4px;"></div>
          <button id="btnSaveJson" class="pill-btn" title="Sauvegarder la liste (JSON)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
          </button>
          <button id="btnRestoreJson" class="pill-btn" title="Restaurer une liste (JSON)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>
          </button>
          <input type="file" id="fileRestore" accept=".json" class="hidden">
          <div class="pill"><span id="countLabel">0 addon</span></div>
        </div>
      </div>

      <!-- List container specifically restricted to scroll -->
      <div id="fitWrap" class="addons-fit">
        <div id="addonsList" class="list"></div>
      </div>
      <div id="emptyState" class="empty hidden">Aucun addon trouvé.</div>
    </section>
  </div>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-card">
      <h3 id="modalTitle">Titre</h3>
      <p id="modalLabel">Label</p>
      <textarea id="modalInput" rows="6"></textarea>
      <div class="actions" style="margin-top:16px">
        <button type="button" class="ghost" id="btnModalCancel">Annuler</button>
        <button type="button" class="primary" id="btnModalSave">Sauvegarder</button>
      </div>
    </div>
  </div>

<script>
const STORAGE_KEY = 'strem-tweaker-v1.0';
const API_BASE = 'https://api.strem.io/api/';
const DISABLED_PREFIX = 'http://127.0.0.1:65432/strem-tweaker-disabled/?url=';

// Base64 generic puzzle icon for fallback
const FALLBACK_ICON = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMykiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cGF0aCBkPSJNMTkuNDM5IDE4LjUzMkExMCAxMCAwIDAgMSAzLjQ2NSAxNCIvPjxwYXRoIGQ9Ik0xOS40MzkgNS40NjhBMTAgMTAgMCAwIDEgMjAuNTM1IDEwIi8+PHBhdGggZD0iTTQuNTYxIDUuNDY4QTEwIDEwIDAgMCAxIDEyIDIiLz48cGF0aCBkPSJNMTIgMjJhMTAgMTAgMCAwIDEtNy40MzktNC41NjgiLz48cGF0aCBkPSJNMTEgMTJoMiIvPjxwYXRoIGQ9Ik0xMiAxMXYyIi8+PC9zdmc+';

const state = { email:'', password:'', authKey:'', addons:[], syncing:false, debugOpen:false, loginCollapsed:false, dragItem:null, dragClone:null, dragOffsetY:0, dragChanged:false, lastPointerY:0, scrollSpeed:0 };
const el = {
  email: document.getElementById('email'), password: document.getElementById('password'), authKey: document.getElementById('authKey'), toggleAuthKey: document.getElementById('toggleAuthKey'), headerEmail: document.getElementById('headerEmail'),
  loginBtn: document.getElementById('loginBtn'), clearBtn: document.getElementById('clearBtn'), copyBtn: document.getElementById('copyBtn'),
  statusDot: document.getElementById('statusDot'), statusText: document.getElementById('statusText'), debugToggle: document.getElementById('debugToggle'), debugWrap: document.getElementById('debugWrap'), debugBox: document.getElementById('debugBox'),
  loginPanel: document.getElementById('loginPanel'), loginHead: document.getElementById('loginHead'), loginStatePill: document.getElementById('loginStatePill'), addonsCard: document.getElementById('addonsCard'), addonsList: document.getElementById('addonsList'), emptyState: document.getElementById('emptyState'), countLabel: document.getElementById('countLabel'), fitWrap: document.getElementById('fitWrap'), mainWrap: document.getElementById('mainWrap'),
  btnSaveJson: document.getElementById('btnSaveJson'), btnRestoreJson: document.getElementById('btnRestoreJson'), fileRestore: document.getElementById('fileRestore'),
  btnCheckUpdates: document.getElementById('btnCheckUpdates')
};

let modalCallback = null;
let scrollRAF = null;

init();

function init(){ 
  loadLocal(); bind(); hydrate(); renderDebug(); renderLoginPanel(); updateLoginPill(); 
  if(state.authKey) {
    setStatus('orange','AuthKey locale trouvée, chargement...');
    loadAddons(); 
  } else {
    logDebug('Application initialisée.');
  }
  updateLayoutMode(); 
}

function bind(){
  el.loginBtn.addEventListener('click', loginAndGetKey);
  el.clearBtn.addEventListener('click', clearAll);
  el.copyBtn.addEventListener('click', copyAuthKey);
  el.debugToggle.addEventListener('click', function(){ state.debugOpen = !state.debugOpen; renderDebug(); saveLocal(); });
  el.loginHead.addEventListener('click', function(e){ if(e.target.closest('button') || e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA') return; state.loginCollapsed = !state.loginCollapsed; renderLoginPanel(); saveLocal(); });

  el.toggleAuthKey.addEventListener('click', function() {
    if(el.authKey.type === 'password') {
      el.authKey.type = 'text';
      this.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
      this.style.color = 'var(--text)';
    } else {
      el.authKey.type = 'password';
      this.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
      this.style.color = 'var(--muted)';
    }
  });

  el.btnSaveJson.addEventListener('click', exportAddons);

  document.getElementById('btnModalSave').addEventListener('click', function(){ closeModal(true); });

  window.addEventListener('pointermove', onMove, { passive:false });
  window.addEventListener('pointerup', onEnd, { passive:false });
  window.addEventListener('pointercancel', onEnd, { passive:false });
  window.addEventListener('touchmove', onMove, { passive:false });
  window.addEventListener('touchend', onEnd, { passive:false });
  window.addEventListener('touchcancel', onEnd, { passive:false });
  window.addEventListener('mousemove', onMove, { passive:false });
  window.addEventListener('mouseup', onEnd, { passive:false });
}

function cmpVersions(a, b) {
  const pa = String(a).split('.'); const pb = String(b).split('.');
  for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
    const na = Number(pa[i] || 0); const nb = Number(pb[i] || 0);
    if (na > nb) return 1; if (nb > na) return -1;
  }
  return 0;
}

async function checkUpdates() {
  if (!state.addons.length) return;
  setStatus('orange', 'Vérification des mises à jour sur ' + state.addons.length + ' addon(s)...');
  el.btnCheckUpdates.disabled = true;
  let updatesCount = 0;

  const promises = state.addons.map(async function(addon) {
    if (addon._disabled) return;
    try {
      let url = addon.transportUrl;
      if (!url.endsWith('manifest.json')) {
        url = url.replace(/\/?$/, '/manifest.json');
      }
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) return;
      const newManifest = await res.json();

      if (newManifest && newManifest.version && addon.manifest && addon.manifest.version) {
        if (cmpVersions(newManifest.version, addon.manifest.version) > 0) {
          addon._hasUpdate = newManifest;
          updatesCount++;
        }
      }
    } catch (e) {} // Ignore offline/CORS issues silently
  });

  await Promise.allSettled(promises);
  el.btnCheckUpdates.disabled = false;

  if (updatesCount > 0) {
    setStatus('green', updatesCount + ' mise(s) à jour trouvée(s) !');
    renderList();
  } else {
    setStatus('green', 'Tous tes addons sont à jour.');
  }
}

function hydrate(){ el.email.value = state.email || ''; el.password.value = state.password || ''; el.authKey.value = state.authKey || ''; }
function loadLocal(){ try{ const raw = localStorage.getItem(STORAGE_KEY); if(!raw) return; const s = JSON.parse(raw); state.email = s.email || ''; state.password = s.password || ''; state.authKey = s.authKey || ''; state.debugOpen = !!s.debugOpen; state.loginCollapsed = !!s.loginCollapsed; }catch(_){} }
function saveLocal(){ localStorage.setItem(STORAGE_KEY, JSON.stringify({ email:state.email, password:state.password, authKey:state.authKey, debugOpen:state.debugOpen, loginCollapsed:state.loginCollapsed })); }

function exportAddons() {
  if(!state.addons || !state.addons.length) return setStatus('orange', 'Rien à sauvegarder.');
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state.addons, null, 2));
  const a = document.createElement('a');
  a.setAttribute("href", dataStr);
  a.setAttribute("download", "stremio-addons-backup.json");
  document.body.appendChild(a);
  a.click();
  a.remove();
  setStatus('green', 'Profil JSON téléchargé.');
}

function importAddons(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if(Array.isArray(imported)) {
        state.addons = imported;
        renderList();
        syncOrder();
      } else { throw new Error('Format invalide'); }
    } catch(err) {
      setStatus('red', 'Erreur lors de la restauration du fichier JSON.');
    }
    evt.target.value = ''; 
  };
  reader.readAsText(file);
}

async function fetchUserEmail() {
  if(!state.authKey) return;
  try {
    const resp = await fetch(API_BASE + 'getUser', { 
      method: 'POST', 
      headers: { 'Content-Type': 'application/json' }, 
      body: JSON.stringify({ authKey: state.authKey }) 
    });
    const data = await resp.json();
    const email = (data && data.result && data.result.email) || (data && data.email);
    if(email) {
      state.email = email;
      el.email.value = email;
      saveLocal();
      updateLoginPill();
    }
  } catch(e) {
    logDebug('Erreur fetchUserEmail: ' + e.message);
  }
}

async function loginAndGetKey(){ 
  const authKeyValue = el.authKey.value.trim();

  if (authKeyValue) {
    state.authKey = authKeyValue;
    saveLocal();
    updateLoginPill();
    setStatus('orange', "Connexion via l'AuthKey fournie...");
    disableTop(true);
    await fetchUserEmail();
    await loadAddons();
    return;
  }

  const email = el.email.value.trim(); const password = el.password.value; 
  if(!email || !password){ setStatus('red', "Renseigne l'email et le mot de passe, ou une AuthKey."); return; } 
  state.email = email; state.password = password; 
  setStatus('orange','Connexion en cours...'); disableTop(true); 
  try{ 
    const resp = await fetch(API_BASE + 'login', { method:'POST', headers:{ 'Content-Type':'application/json', 'Accept':'application/json' }, body: JSON.stringify({ type:'Login', email:email, password:password, facebook:false }) }); 
    const data = await resp.json(); 
    const authKey = (data && data.result && data.result.authKey) || data.authKey || ''; 
    if(!resp.ok || !authKey){ throw new Error("Impossible de récupérer l'AuthKey"); } 
    state.authKey = authKey; el.authKey.value = authKey; 
    saveLocal(); 
    updateLoginPill();
    setStatus('green','Connecté avec succès. Chargement des addons...');
    await loadAddons();
  } catch(error){ 
    state.authKey=''; el.authKey.value=''; saveLocal(); updateLoginPill(); setStatus('red','Erreur login : ' + (error.message || 'échec inconnu')); disableTop(false);
  } 
}

async function copyAuthKey(){ try{ const value = el.authKey.value.trim(); if(!value) throw new Error('Aucune AuthKey à copier.'); if(navigator.clipboard && navigator.clipboard.writeText){ await navigator.clipboard.writeText(value); } else { el.authKey.select(); document.execCommand('copy'); } setStatus('green','AuthKey copiée.'); } catch(error){ setStatus('red','Erreur copie : ' + (error.message || 'échec inconnu')); } }

async function loadAddons(){ 
  if(!state.authKey){ setStatus('red','AuthKey manquante.'); el.addonsCard.classList.add('hidden'); return; } 
  setStatus('orange','Chargement des addons depuis Stremio...'); disableTop(true); 
  try{ 
    const resp = await fetch(API_BASE + 'addonCollectionGet', { method:'POST', headers:{ 'Content-Type':'application/json', 'Accept':'application/json' }, body: JSON.stringify({ type:'AddonCollectionGet', authKey:state.authKey, update:true }) }); 
    const data = await resp.json(); 
    if(!resp.ok || data.error || (data.result && data.result.error)){ throw new Error('Impossible de charger les addons'); } 

    if(!state.email) { fetchUserEmail(); }

    const fetched = Array.isArray(data.result && data.result.addons) ? data.result.addons : []; 
    fetched.forEach(function(a){
      if(a.transportUrl && a.transportUrl.startsWith(DISABLED_PREFIX)){
        a._disabled = true;
      } else {
        a._disabled = false;
      }
    });
    state.addons = fetched;

    state.loginCollapsed = true; saveLocal(); renderLoginPanel(); updateLoginPill(); updateLayoutMode(); el.addonsCard.classList.remove('hidden'); renderList(); setStatus('green', state.addons.length ? 'Addons synchronisés avec succès.' : 'Aucun addon trouvé.'); 
  } catch(error){ 
    state.addons=[]; renderList(); updateLayoutMode(); el.addonsCard.classList.add('hidden'); setStatus('red','Erreur chargement : ' + (error.message || 'échec inconnu')); 
  } finally{ disableTop(false); } 
}

// Modal logic
function showModal(title, label, value, callback) {
  modalCallback = callback;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalLabel').textContent = label;
  document.getElementById('modalInput').value = value;
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal(save) {
  document.getElementById('modalOverlay').classList.remove('active');
  if(modalCallback) {
    if(save) { modalCallback(document.getElementById('modalInput').value.trim()); }
    modalCallback = null;
  }

// Actions
function deleteAddon(addon) {
  const title = addon.manifest && addon.manifest.name ? addon.manifest.name : 'cet addon';
  if(confirm('Es-tu sûr de vouloir supprimer définitivement "' + title + '" de ton profil Stremio ?')) {
    const idx = state.addons.indexOf(addon);
    if(idx > -1) {
      state.addons.splice(idx, 1);
      renderList();
      syncOrder();
    }
  }
}

function applyUpdate(addon) {
  if(!addon._hasUpdate) return;
  addon.manifest = addon._hasUpdate;
  addon._hasUpdate = null;
  renderList();
  syncOrder();
}

function toggleAddon(addon) {
  addon._disabled = !addon._disabled;
  if(addon._disabled) {
    if(!addon.transportUrl.startsWith(DISABLED_PREFIX)){
      addon.transportUrl = DISABLED_PREFIX + encodeURIComponent(addon.transportUrl);
    }
  } else {
    if(addon.transportUrl.startsWith(DISABLED_PREFIX)){
      addon.transportUrl = decodeURIComponent(addon.transportUrl.substring(DISABLED_PREFIX.length));
    }
  }
  renderList();
  syncOrder();
}

function openEditUrl(addon) {
  let currentUrl = addon.transportUrl;
  if(addon._disabled && currentUrl.startsWith(DISABLED_PREFIX)) { currentUrl = decodeURIComponent(currentUrl.substring(DISABLED_PREFIX.length)); }
  showModal('Modifier l\'URL', 'Édition complète du lien de l\'addon :', currentUrl, function(newUrl) {
    if(!newUrl || newUrl === currentUrl) return;
    addon.transportUrl = addon._disabled ? DISABLED_PREFIX + encodeURIComponent(newUrl) : newUrl;
    renderList();
    syncOrder();
  });
}

function moveToTop(addon) {
  const idx = state.addons.indexOf(addon);
  if (idx > 0) {
    state.addons.splice(idx, 1);
    state.addons.unshift(addon);
    renderList(addon);
    syncOrder();
    el.fitWrap.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function moveToBottom(addon) {
  const idx = state.addons.indexOf(addon);
  if (idx !== -1 && idx < state.addons.length - 1) {
    state.addons.splice(idx, 1);
    state.addons.push(addon);
    renderList(addon);
    syncOrder();
    el.fitWrap.scrollTo({ top: el.fitWrap.scrollHeight, behavior: 'smooth' });
  }
}

function renderList(activeAddon){ 
  // Prevent scroll jumping during re-render
  const st = el.fitWrap.scrollTop;
  el.addonsList.style.minHeight = el.addonsList.scrollHeight + 'px';
  el.addonsList.innerHTML=''; 

  const count = state.addons.length; el.countLabel.textContent = count + (count > 1 ? ' addons' : ' addon'); el.emptyState.classList.toggle('hidden', count !== 0); 
  state.addons.forEach(function(addon, index){ 
    const manifest = addon.manifest || {}; 
    const title = manifest.name || manifest.id || 'Addon'; 
    const version = manifest.version ? 'v' + manifest.version : '';
    const isConfigurable = manifest.behaviorHints && manifest.behaviorHints.configurable === true;
    const isFirst = index === 0;
    const isLast = index === count - 1;

    let rawIcon = manifest.icon || manifest.logo || addon.icon || addon.logo;
    let iconUrl = FALLBACK_ICON;
    if (rawIcon) {
      if (rawIcon.startsWith('//')) {
        iconUrl = 'https:' + rawIcon;
      } else if (rawIcon.startsWith('http') || rawIcon.startsWith('data:')) {
        iconUrl = rawIcon;
      } else {
        try {
          let base = addon.transportUrl;
          if (addon._disabled && base.startsWith(DISABLED_PREFIX)) {
            base = decodeURIComponent(base.substring(DISABLED_PREFIX.length));
          }
          iconUrl = new URL(rawIcon, base).href;
        } catch(e) {
          iconUrl = FALLBACK_ICON;
        }
      }
      if (iconUrl.startsWith('http://') && window.location.protocol === 'https:') {
        iconUrl = iconUrl.replace('http://', 'https://');
      }
    }

    const card = document.createElement('div'); 
    card.className = 'addon-card' + (state.dragItem === addon ? ' drag-source' : '') + (activeAddon === addon ? ' flash' : '') + (addon._disabled ? ' is-disabled' : ''); 
    card.dataset.index = String(index); 

    const updateBadge = addon._hasUpdate ? `<span class="addon-update-badge">v${addon._hasUpdate.version} dispo</span>` : '';
    const versionBadge = version ? `<span class="addon-version">${version}</span>` : '';

    // NEW LAYOUT: Row 1 = addon-main, Row 2 = addon-actions
    card.innerHTML = `
      <div class="addon-main">
        <div class="rank">${index + 1}</div>
        <div class="addon-title-wrap">
          <img class="addon-icon" src="${escapeHtml(iconUrl)}" alt="" onerror="this.src='${FALLBACK_ICON}'">
          <div class="addon-title" title="${escapeHtml(title)}">${escapeHtml(title)}</div>
          ${versionBadge}
          ${updateBadge}
        </div>
        <div class="action-btn toggle-btn" title="Activer/Désactiver">${addon._disabled ? svgEyeOff : svgEye}</div>
        <div class="drag-handle">${svgGrip}</div>
      </div>

      <div class="addon-actions">
        <div class="action-btn btn-totop ${isFirst ? 'hidden-btn' : ''}" title="Monter en 1er">${svgToTop}</div>
        <div class="action-btn btn-tobottom ${isLast ? 'hidden-btn' : ''}" title="Descendre en dernier">${svgToBottom}</div>
        <div class="action-btn btn-update ${addon._hasUpdate ? '' : 'hidden-btn'}" style="color:var(--wait); border-color:rgba(255,184,77,0.3); background:rgba(255,184,77,0.1);" title="Mettre à jour">${svgUpdate}</div>
        <div class="action-btn btn-config ${isConfigurable ? '' : 'hidden-btn'}" title="Configurer">${svgGear}</div>
        <div class="action-btn btn-edit" title="Changer URL">${svgEdit}</div>
        <div style="flex:1;"></div>
        <div class="action-btn btn-delete" style="color:var(--ko); border-color:rgba(255,109,134,0.3); background:rgba(255,109,134,0.1);" title="Fermer (Supprimer)">${svgCross}</div>
      </div>
    `;

    // Toggle expand
    const mainRow = card.querySelector('.addon-main');
    ['click'].forEach(function(evt){ 
        mainRow.addEventListener(evt, function(e){ 
            if(e.target.closest('.toggle-btn') || e.target.closest('.drag-handle')) return;
            e.preventDefault(); 
            card.classList.toggle('expanded'); 
        }); 
    });

    const handle = card.querySelector('.drag-handle'); 
    ['pointerdown','touchstart','mousedown'].forEach(function(evt){ handle.addEventListener(evt, function(e){ startDrag(e, addon); }, { passive:false }); }); 

    if(!isFirst) {
      const btnToTop = card.querySelector('.btn-totop');
      ['click','touchstart'].forEach(function(evt){ btnToTop.addEventListener(evt, function(e){ e.preventDefault(); e.stopPropagation(); moveToTop(addon); }, { passive:false }); });
    }

    if(!isLast) {
      const btnToBottom = card.querySelector('.btn-tobottom');
      ['click','touchstart'].forEach(function(evt){ btnToBottom.addEventListener(evt, function(e){ e.preventDefault(); e.stopPropagation(); moveToBottom(addon); }, { passive:false }); });
    }

    if(addon._hasUpdate) {
      const btnUpdate = card.querySelector('.btn-update');
      ['click','touchstart'].forEach(function(evt){ btnUpdate.addEventListener(evt, function(e){ e.preventDefault(); e.stopPropagation(); applyUpdate(addon); }, { passive:false }); });
    }

    const btnDelete = card.querySelector('.btn-delete');
    ['click','touchstart'].forEach(function(evt){ btnDelete.addEventListener(evt, function(e){ e.preventDefault(); e.stopPropagation(); deleteAddon(addon); }, { passive:false }); });

    const btnToggle = card.querySelector('.toggle-btn');
    ['click','touchstart'].forEach(function(evt){ btnToggle.addEventListener(evt, function(e){ e.preventDefault(); e.stopPropagation(); toggleAddon(addon); }, { passive:false }); });

    const btnEdit = card.querySelector('.btn-edit');
    ['click','touchstart'].forEach(function(evt){ btnEdit.addEventListener(evt, function(e){ e.preventDefault(); e.stopPropagation(); openEditUrl(addon); }, { passive:false }); });

    if(isConfigurable) {
      const btnConfig = card.querySelector('.btn-config');
      ['click','touchstart'].forEach(function(evt){ 
        btnConfig.addEventListener(evt, function(e){ 
          e.preventDefault(); e.stopPropagation(); 
          let currentUrl = addon.transportUrl;
          if(addon._disabled && currentUrl.startsWith(DISABLED_PREFIX)) { 
            currentUrl = decodeURIComponent(currentUrl.substring(DISABLED_PREFIX.length)); 
          }
          const configUrl = currentUrl.replace(/\/manifest\.json(?:\?.*)?$/, '/configure');
          window.open(configUrl, '_blank');
        }, { passive:false }); 
      });
    }

    el.addonsList.appendChild(card); 
  }); 

  el.addonsList.style.minHeight = '';
  el.fitWrap.scrollTop = st;
}

function getPoint(evt){ if(evt.touches && evt.touches[0]) return { x: evt.touches[0].clientX, y: evt.touches[0].clientY }; if(evt.changedTouches && evt.changedTouches[0]) return { x: evt.changedTouches[0].clientX, y: evt.changedTouches[0].clientY }; return { x: evt.clientX, y: evt.clientY }; }

function scrollLoop() {
  if (!state.dragItem) {
    scrollRAF = null;
    return;
  }
  if (state.scrollSpeed !== 0) {
    el.fitWrap.scrollTop += state.scrollSpeed;
    checkDragSwap(state.lastPointerY);
  }
  scrollRAF = requestAnimationFrame(scrollLoop);
}

function startDrag(evt, addon){ 
  if(state.syncing) return; evt.preventDefault(); evt.stopPropagation(); 
  const point = getPoint(evt); const card = evt.currentTarget.closest('.addon-card'); 
  card.classList.remove('expanded'); // Auto-collapse before dragging

  const rect = card.getBoundingClientRect(); 
  state.dragItem = addon; state.dragChanged = false; state.dragOffsetY = point.y - rect.top; 
  state.lastPointerY = point.y;
  state.scrollSpeed = 0;

  createClone(card, rect); 
  card.classList.add('drag-source'); 
  updateClonePosition(point.y); 
  document.body.classList.add('dragging'); setStatus('orange', "Glisse pour réorganiser..."); 

  if(!scrollRAF) scrollRAF = requestAnimationFrame(scrollLoop);
}

function createClone(card, rect){ 
  removeClone(); 
  state.dragClone = card.cloneNode(true); 
  state.dragClone.classList.add('floating-card'); 
  state.dragClone.style.width = rect.width + 'px'; 
  state.dragClone.style.height = rect.height + 'px'; 
  state.dragClone.style.left = rect.left + 'px'; 
  state.dragClone.style.top = rect.top + 'px'; 
  document.body.appendChild(state.dragClone); 
}

function removeClone(){ if(state.dragClone && state.dragClone.parentNode){ state.dragClone.parentNode.removeChild(state.dragClone); } state.dragClone = null; }

function updateClonePosition(clientY){ 
  if(!state.dragClone) return; 
  state.dragClone.style.top = (clientY - state.dragOffsetY) + 'px'; 
}

function onMove(evt){ 
  if(!state.dragItem) return; evt.preventDefault(); 
  const point = getPoint(evt); 
  state.lastPointerY = point.y;
  updateClonePosition(point.y); 

  const wrapRect = el.fitWrap.getBoundingClientRect();
  const threshold = 60; // Pixels from border to trigger scroll

  if (point.y < wrapRect.top + threshold) {
      state.scrollSpeed = Math.max(-20, point.y - (wrapRect.top + threshold));
  } else if (point.y > wrapRect.bottom - threshold) {
      state.scrollSpeed = Math.min(20, point.y - (wrapRect.bottom - threshold));
  } else {
      state.scrollSpeed = 0;
  }

  checkDragSwap(point.y);
}

function checkDragSwap(clientY) {
  const nextIndex = indexFromPointerY(clientY);
  const currentIndex = state.addons.indexOf(state.dragItem);

  if(nextIndex !== -1 && nextIndex !== currentIndex) {
    if(state.dragClone) {
      const rankEl = state.dragClone.querySelector('.rank');
      if(rankEl) rankEl.textContent = nextIndex + 1;
    }
    state.addons.splice(currentIndex, 1); 
    state.addons.splice(nextIndex, 0, state.dragItem); 
    state.dragChanged = true; 
    renderList(state.dragItem); 
  }
}

function onEnd(evt){ 
  if(!state.dragItem) return; if(evt) evt.preventDefault(); const movedAddon = state.dragItem; 
  state.scrollSpeed = 0;
  if(scrollRAF) { cancelAnimationFrame(scrollRAF); scrollRAF = null; }

  removeClone(); state.dragItem = null; document.body.classList.remove('dragging'); renderList(movedAddon); 
  if(state.dragChanged){ 
    syncOrder(); 
  } else { setStatus('green', "Aucun changement d'ordre."); } 
}

function indexFromPointerY(clientY){ 
  const cards = Array.from(el.addonsList.querySelectorAll('.addon-card')); if(!cards.length) return -1; 
  for(let i=0;i<cards.length;i++){ const rect = cards[i].getBoundingClientRect(); if(clientY < rect.top + rect.height / 2){ return i; } } 
  return cards.length - 1; 
}

async function syncOrder(){ 
  if(state.syncing) return; setStatus('orange', "Mise à jour dans le cloud Stremio..."); 
  try{ 
    state.syncing = true; document.querySelectorAll('.drag-handle, .action-btn').forEach(function(node){ node.style.pointerEvents = 'none'; }); 
    const resp = await fetch(API_BASE + 'addonCollectionSet', { method:'POST', headers:{ 'Content-Type':'application/json', 'Accept':'application/json' }, body: JSON.stringify({ type:'AddonCollectionSet', authKey:state.authKey, addons:state.addons }) }); 
    const data = await resp.json(); 
    if(!resp.ok || !(data.result && data.result.success)){ throw new Error('Échec de synchronisation'); } 
    setStatus('green', 'Profil Stremio mis à jour avec succès.'); 
  } catch(error){ setStatus('red', 'Erreur synchronisation : ' + (error.message || 'échec inconnu')); await loadAddons(); } 
  finally{ state.syncing = false; state.dragChanged = false; document.querySelectorAll('.drag-handle, .action-btn').forEach(function(node){ node.style.pointerEvents = 'auto'; }); } 
}

function escapeHtml(text){ return String(text).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'", '&#039;'); }
</script>
